<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Especialidades - Retro Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0d0d0d; color: #00ff00; font-family: 'Courier New', Courier, monospace; padding: 20px; }
        .container { max-width: 800px; margin: auto; border: 1px solid #00ff00; padding: 20px; }
        button { background: #000; color: #00ff00; border: 1px solid #00ff00; padding: 10px; cursor: pointer; margin: 5px; }
        button:hover { background: #00ff00; color: #000; }
        canvas { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>> ANALISIS_ESPECIALIDADES.exe</h1>
        <p>Seleccione su especialidad de interés:</p>
        <button onclick="votar('Refuerzo')">REFUERZO SONORO</button>
        <button onclick="votar('Acustica')">ACUSTICA</button>
        <button onclick="votar('Desarrollo')">DESARROLLO (SW/HW)</button>
        
        <canvas id="barChart"></canvas>
        <canvas id="pieChart"></canvas>
        <canvas id="polarChart"></canvas>
    </div>

    <script>
        let votos = JSON.parse(localStorage.getItem('votos')) || { Refuerzo: 0, Acustica: 0, Desarrollo: 0 };

        function votar(opcion) {
            votos[opcion]++;
            localStorage.setItem('votos', JSON.stringify(votos));
            actualizarGraficos();
        }

        const config = (type) => ({
            type: type,
            data: {
                labels: ['Refuerzo Sonoro', 'Acústica', 'Desarrollo'],
                datasets: [{ label: 'Votos', data: [votos.Refuerzo, votos.Acustica, votos.Desarrollo], backgroundColor: ['#00ff00', '#008800', '#004400'] }]
            }
        });

        let charts = [
            new Chart(document.getElementById('barChart'), config('bar')),
            new Chart(document.getElementById('pieChart'), config('pie')),
            new Chart(document.getElementById('polarChart'), config('polarArea'))
        ];

        function actualizarGraficos() {
            charts.forEach(chart => {
                chart.data.datasets[0].data = [votos.Refuerzo, votos.Acustica, votos.Desarrollo];
                chart.update();
            });
        }
    </script>
</body>
</html>
